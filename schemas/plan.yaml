# schemas/plan.yaml — Plan file reference
#
# The planner model writes this to .orome/plan.yaml during `orome plan`.
# The harness reads it on `orome run` and dispatches tasks.
#
# This file is a documented example, not a live plan.

plan:
  # Unique plan identifier. Generated by the planner.
  id: plan-20260331-001

  # One-line summary of what this plan accomplishes.
  summary: Refactor provider trait to support batch requests

  # Planner's reasoning for this decomposition. Auditable — the harness
  # and user can review why the plan was structured this way.
  reasoning: |
    Batch support requires new types, trait extension, and per-adapter
    implementation. Types are independent and small. Adapters can be
    done in parallel once the trait is extended. Tests depend on both.

  tasks:
    - id: batch-types
      # What the worker must accomplish. Should be concrete and bounded.
      objective: Add BatchRequest and BatchResponse types to providers/types.rs

      # How the reviewer judges the work. Each criterion is independently
      # verifiable. The worker sees these before starting.
      acceptance_criteria:
        - BatchRequest wraps Vec<ChatRequest> with shared config
        - BatchResponse wraps Vec<ChatResponse> preserving ordering
        - Types derive Serialize, Deserialize, Debug, Clone
        - Existing types unchanged

      # Task IDs that must complete before this task can start.
      # Empty list = ready to dispatch immediately.
      dependencies: []

      # Advisory hints from the planner to the harness. Not binding.
      hints:
        # Files the worker should look at. Harness may pre-fetch or
        # include in context for local models.
        relevant_files:
          - harness/src/providers/types.rs
        # Free-form guidance injected into the worker's context.
        guidance: Follow existing type patterns in the file.

    - id: trait-extend
      objective: Add batch_chat method to Provider trait with default sequential impl
      acceptance_criteria:
        - async batch_chat method on Provider trait
        - Default impl calls chat() in a loop
        - Existing trait methods unchanged
      dependencies: [batch-types]
      hints:
        relevant_files:
          - harness/src/providers/mod.rs
          - harness/src/providers/types.rs

    - id: adapt-orome
      objective: Implement batch_chat for orome-local using concurrent requests
      acceptance_criteria:
        - Overrides default sequential impl
        - Concurrent dispatch bounded by server capacity
      dependencies: [trait-extend]

    - id: adapt-anthropic
      objective: Implement batch_chat for anthropic provider
      acceptance_criteria:
        - Concurrent individual requests
        - Handles rate limit backoff
      dependencies: [trait-extend]

    - id: tests
      objective: Integration tests for batch_chat
      acceptance_criteria:
        - Round-trip serialization test
        - Default sequential impl test
        - 3+ request batch test
      dependencies: [adapt-orome, adapt-anthropic]
      hints:
        relevant_files:
          - harness/tests/

  # Optional: override defaults from orome.yaml for this plan.
  review:
    reviewers_per_task: 1
    max_retries: 2
